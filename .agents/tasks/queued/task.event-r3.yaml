id: task.event-r3
kind: task
version: 1
title: move attach, resize, and scheduler control onto explicit runtime events
status: done
priority: critical
source_of_truth:
  file: .agents/tasks/backlog.yaml
  reference: next
depends_on:
  - task.event-r2a.done
linked_primitives:
  - primitive.verification-refresh
  - primitive.task-history-update
  - primitive.task-board-sync
  - primitive.agents-self-maintenance
done_criteria:
  - attach flow reacts to socket input, stdin input, daemon output, and terminal resize through explicit events rather than fixed client ticks
  - scheduler recomputation is triggered by named session-state transitions, input, output, focus, and resize events rather than periodic wakeups
  - new local control flow no longer relies on `recv_timeout(EVENT_LOOP_TICK)` as the primary coordination mechanism
  - new runtime modules make event propagation and ownership easier to audit than the old mixed app loop
verification:
  - cargo test
  - manual: attach and resize behavior in a real terminal without visible tick-latency artifacts
  - targeted review of the new event loop modules and scheduler triggers
touched_paths:
  - src/infra/tmux_backend.rs
  - src/runtime
  - src/runtime/event_driven_pane_runtime.rs
  - src/runtime/workspace_layout_runtime.rs
  - src/application
  - src/domain
  - src/app.rs
  - .agents/tasks/queued/task.event-r3.yaml
notes:
  - This slice should build the new control path, not patch the historical tick loop in place unless that is the smallest route to isolate it behind a new boundary.
  - 2026-04-24 pause: do not resume this slice until in-workspace target switching stops leaving the current client. The current `detach-client -E "waitagent attach <target>"` path is an upstream blocker because it cannot satisfy fixed chrome, no shell reveal, or no flicker.
  - 2026-04-27 resumed: `task.event-r2a` umbrella acceptance is closed, so active work now moves to removing remaining accepted-path tick, timeout, and sleep-driven coordination from attach, resize, and scheduler control.
  - 2026-04-27 progress: startup chrome readiness now flows through explicit sidebar and footer ready signals rather than pane-text polling with fixed sleeps, while pane-identity session options keep the wait robust when pane processes render before waiters attach.
  - 2026-04-27 progress: the accepted path now re-establishes a main-pane output bridge with `pipe-pane -O`, but the bridge only emits a lightweight `__chrome-refresh-signal`; pane runtimes consume the signal and refresh snapshots themselves, so command-identity changes in the active target can update sidebar labels without waiting for fullscreen or layout reconciliation.
  - 2026-04-27 completed: manual attach and resize validation passed on the accepted path, and the stale auto-switch verification wording was retired because auto-switch is no longer part of the current local product contract.
  - When this slice resumes, audit `src/app.rs` and attach-side control flow for remaining `EVENT_LOOP_TICK`, `recv_timeout`, and sleep-based coordination on the accepted local path.
  - This task is the second slice in the locked local-priority batch `task.event-r2a -> task.event-r3 -> task.event-r4`.

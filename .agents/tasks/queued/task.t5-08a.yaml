title: introduce a real cross-host authority ingress source on the accepted connection boundary
status: done
priority: high
design_ref:
  doc: docs/remote-node-connection-architecture.md
  why:
    - the architecture task must first define the accepted node-scoped ingress and connection-reuse model
    - this slice then lands the first production connection source within that accepted architecture
target_task_reference: task.t5-08a
source_of_truth:
  file: .agents/tasks/backlog.yaml
  reference: next
depends_on:
  - task.t5-08a1.done

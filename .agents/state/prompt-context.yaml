kind: state
version: 1
summary:
  purpose: keep the default assistant prompt minimal and load completed-task history only when it is materially relevant
default_prompt_inputs:
  - .agents/index.yaml
  - .agents/state/current-focus.yaml
  - .agents/tasks/current.yaml
  - .agents/state/open-blockers.yaml
  - .agents/state/prompt-context.yaml
always_include:
  active_task:
    include:
      - task spec
      - design_ref
      - depends_on
      - done_criteria
      - touched_paths
  active_state:
    include:
      - current focus
      - open blockers
      - prompt-context compact summaries
completed_context_policy:
  default: do_not_load_completed_tasks_by_default
  load_only_when:
    - the active task explicitly depends on a completed task and the dependency summary is needed to understand current invariants
    - a regression or review question references a completed task by id
    - verification evidence for the active task directly reuses a completed task's manual scenario or contract
    - the active design_ref names a predecessor slice whose outcome is still normative for the current work
  otherwise_prefer:
    - active task design_ref
    - current task file
    - current focus state
    - compact predecessor summaries from this file
completed_task_compact_summaries:
  - task_id: task.remote-create-9f-acceptance
    why_it_matters_now: corrected Ctrl-W and Ctrl-S behavior has user acceptance, so remote exit latency work should not reopen remote creation semantics while improving exit responsiveness
    load_full_history_only_if:
      - a regression suggests Ctrl-W first connect, repeated Ctrl-W, or Ctrl-S no longer creates or activates the expected remote session
      - remote session exit latency changes touch remote session creation or activation code
  - task_id: task.remote-create-9e-daemon-parity
    why_it_matters_now: __remote-daemon parity with manual waitagent --connect is accepted, so the remote default-session publication path is treated as stable while exit-latency work focuses on session sync wakeup and publication refresh cost
    load_full_history_only_if:
      - remote daemon startup or default-session publication is modified
      - first Ctrl-W to an unconnected endpoint stops activating the default published session
  - task_id: task.remote-exit-latency-1
    why_it_matters_now: completed task; it added acknowledged local catalog changed notify into the remote session sync owner event loop while preserving sync_local_sessions as the catalog-diff authority
    load_full_history_only_if:
      - local notify delivery, session sync owner ownership, or catalog-diff authority becomes unclear
  - task_id: task.remote-exit-latency-2
    why_it_matters_now: completed task; WaitAgent-managed local target close paths now wake the acknowledged session sync owner notify boundary after tmux kill success or already-gone results without direct sidebar mutation
    load_full_history_only_if:
      - lifecycle exit ownership or notify retry behavior becomes unclear
  - task_id: task.remote-exit-latency-3
    why_it_matters_now: completed task; TargetExited publication refresh uses a runtime-owned live workspace socket registry before tmux fallback, preserving runtime-owned refresh boundaries
    load_full_history_only_if:
      - publication refresh socket resolution or registry ownership becomes unclear
  - task_id: task.remote-exit-latency-4
    why_it_matters_now: completed task; release E2E confirms remote session exit now wakes sync, applies TargetExited publication, signals workspace fallback, prunes stale workspace registry entries, and gates investigation diagnostics behind WAITAGENT_EXIT_LATENCY_DIAG
    load_full_history_only_if:
      - remote exit timing instrumentation, manual E2E validation, or diagnostic cleanup scope becomes unclear
  - task_id: task.remote-main-slot-authority-gap-followup
    why_it_matters_now: completed batch follow-up; remote main-slot pane activation now treats missing authority/control-plane registration as pane-internal pending state for resize and input rather than a fatal process exit
    load_full_history_only_if:
      - remote main-slot panes exit while remote authority is offline or reconnecting
      - sidebar remote reactivation after a remote exit stops restoring focus to the remote main pane
load_heavy_state_only_when:
  task_history:
    file: .agents/state/task-history.yaml
    when:
      - switching current task
      - generating a retrospective summary
      - investigating how a completed task changed status over time
  archived_task_history:
    file: .agents/state/task-history-archive.yaml
    when:
      - only when hot task history is insufficient for a historical investigation
      - never as part of the default prompt
  verification:
    file: .agents/state/last-verified.yaml
    when:
      - selecting which checks to rerun
      - answering whether a specific scenario was previously validated
      - updating verification after tests or manual checks
  backlog:
    file: .agents/tasks/backlog.yaml
    when:
      - switching tasks
      - splitting or reordering tasks
      - checking whether a newly discovered slice already exists
state_update_rules:
  - when the current task changes, refresh current-focus and this file together
  - when a task is completed or superseded, update its compact summary entry here if future tasks may need it
  - when a completed task stops being relevant to any active queue, remove or compress its summary here
  - do not copy full historical narratives into this file; keep one or two high-signal sentences per completed task

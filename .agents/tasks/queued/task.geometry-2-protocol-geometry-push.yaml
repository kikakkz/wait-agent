  - verified: cargo fmt --check, cargo check, codec round-trip test control_plane_envelope_round_trips_target_geometry_changed, full gRPC loopback leg in grpc_session_runtime_bridges_authority_and_publication_through_ingress_boundary (send_payload TargetGeometryChanged -> proto -> ingress bridge -> authority envelope), suites: remote_transport_codec (13), remote_node (96), remote_authority (37), remote_main_slot (68)

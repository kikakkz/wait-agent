id: task.event-r2a
kind: task
version: 1
title: replace cross-session attach switching with fixed-chrome main-slot target activation
status: in_progress
priority: critical
source_of_truth:
  file: .agents/tasks/backlog.yaml
  reference: next
depends_on:
  - task.event-r2.done
linked_primitives:
  - primitive.verification-refresh
  - primitive.task-history-update
  - primitive.task-board-sync
  - primitive.agents-self-maintenance
done_criteria:
  - sidebar and footer or menu target activation keeps workspace chrome mounted, does not reveal the shell, and does not rebuild the workspace client
  - the visible workspace is modeled as one persistent chrome layout with a fixed sidebar, a fixed main slot, and a fixed footer or menu, where target changes only rebind the main slot
  - local target switching no longer depends on `detach-client -E "waitagent attach <target>"`; it uses tmux-native rebinding inside one backend instead
  - sidebar items remain session identities rather than reusable host slots; when the active local target shell exits, that target identity is removed from the catalog and the next surviving target, if any, is rebound into the main slot
  - target identity and activation remain transport-agnostic so future remote targets can bind into the same main slot through a bridge runtime
  - `waitagent` versus `waitagent attach` semantics are explicit and preserved: the default entry boots or creates a backend, while `attach` joins an existing backend only
verification:
  - cargo test
  - manual: in a real terminal, sidebar Enter and footer menu switching keep sidebar and footer fixed, return focus to the shell area, and change only the main view without shell reveal or flicker
  - targeted review of target activation flow across `src/runtime`, `src/application`, `src/domain`, and the tmux backend boundaries
touched_paths:
  - src/runtime
  - src/application
  - src/domain
  - src/infra/tmux_backend.rs
  - docs/tmux-first-workspace-plan.md
  - docs/tmux-first-runtime-architecture.md
  - docs/event-driven-local-runtime-architecture.md
  - docs/execution-status-board.md
  - .agents/tasks/current.yaml
  - .agents/tasks/backlog.yaml
  - .agents/tasks/queued/task.event-r2a.yaml
  - .agents/tasks/queued/task.event-r3.yaml
  - .agents/state/current-focus.yaml
  - .agents/state/open-blockers.yaml
  - .agents/state/task-history.yaml
  - .agents/state/last-verified.yaml
  - .agents/context/constraints.yaml
  - .agents/index.yaml
notes:
  - Root cause confirmed in terminal on 2026-04-24: sidebar Enter and footer menu switching still detach the client and relaunch through `waitagent attach <target>`, which exits to the shell before re-entering waitagent.
  - Treat the shell reveal and flicker on target switching as a root-cause architecture problem, not a redraw bug.
  - Do not patch over detach or reattach with delayed respawns or redraw suppression; replace the switching model so the current client never leaves the workspace during in-workspace target activation.
  - Local realization may use parked panes, parked windows, `swap-pane`, `join-pane`, `move-pane`, or equivalent tmux-native rebinding primitives as long as the visible chrome stays fixed.
  - 2026-04-25 refinement: session identity, not host-slot reuse, is the accepted sidebar contract for local targets; active target exit must retire that target-host session and shrink the visible catalog.
  - Remote targets are not part of this implementation slice, but the target model for local work must not block a later bridge-backed main-slot renderer.
  - This task starts the locked local-priority batch `task.event-r2a -> task.event-r3 -> task.event-r4`.

notes:
  - Historical evidence reviewed for this task includes `.agents/tasks/queued/task.sidebar-1.yaml`, `docs/ui-design.md`, and legacy sidebar or footer literals and tests in `src/app.rs`.
  - Reusable legacy contract evidence includes the sidebar header pattern `Sessions  [h] hide`, one-line session rows shaped like `bash@local` or `codex@local`, right-edge wait-state badges such as `INPUT` and `CONFIRM`, a bottom detail area rather than floating detail chrome, and footer strings shaped like `WaitAgent | ...` plus current-session context.
  - Non-reusable historical details include the old overlay compositor, redraw-diff logic, transcript-damage tracking, and any behavior that depended on painting sidebar or footer content onto the same terminal surface as the main session output.
  - Outcome mapping: the persistent chrome information hierarchy belongs in `task.tmux-r5`, while working menu actions, sidebar hide or reveal shortcuts, and session-switch popups belong in `task.tmux-r7`.

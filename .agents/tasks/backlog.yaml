source_of_truth:
  file: .agents/tasks/backlog.yaml
notes:
  - `.agents/tasks/*` is the unified task source; task status changes must update backlog, the current task pointer, queued task files, and task/state mirrors in the same change.
  - Replacement work must clean up superseded code paths as it lands; old fullscreen-history logic should not be left in place behind the new architecture unless a named compatibility reason is documented in the active task.
  - T3-07 remains optional for the local MVP unless acceptance evidence proves it is blocking.
  - Post-acceptance work now prioritizes tmux-style local lifecycle persistence before resumed network expansion.
  - The lifecycle queue must preserve the existing workspace interaction loop and the stabilized rendering path; daemonization should wrap the current runtime rather than rewrite it.
  - The old gutter-scroll direction is intentionally retired in favor of a fullscreen-first interaction model because dashboard-local mouse scrolling is not robust across desktop terminals and remote terminal clients.
  - Display work is no longer deferred: it is now the active track because the fullscreen handoff model is the cleanest way to restore native terminal scroll, selection, and IME behavior.
  - The original fullscreen task was split because entry/exit controls landed, but snapshot-based history reconstruction is not an acceptable architectural base for fullscreen old-history viewing.
  - `task.architecture-1` is intentionally parked as deferred cleanup so it stays visible without silently becoming the next in-progress delivery slice.

notes:
  - This task follows the split remote-foundation queue `task.t5-06a -> task.t5-06b -> task.t5-06c -> task.t5-07`.
  - 2026-04-29 refinement: this umbrella was first split into bounded slices and later corrected again when the planned auto-switch slice was cancelled in favor of a manual-only attention policy lock.
  - The accepted console model is a server-side target-activation surface, not a parallel local-style tmux client running on top of remote PTYs.
  - The authoritative top-down design for the remaining `task.t6-01` work now lives in `docs/server-console-scheduling-design.md`; if that document and older remote-deferred wording disagree, follow the active design doc for this task.
  - The first `task.t6-01` slice is already in code: the server console has a hidden remote-interact runtime that reuses the same observer, authority-ingress, and publication path as the local remote main-slot rather than inventing a second remote interaction stack.
  - The current `task.t6-01` slice is now in code as well: `waitagent server --socket-name <socket>` is now a public entrypoint for a long-lived `picker -> target -> picker` lifecycle, resolves activation targets from the same shared catalog boundary, routes local targets through the existing local attach path, and routes remote targets through the shared remote interact surface with `Ctrl-]` returning to the picker.
  - The server console now also keeps explicit runtime-local focus and scheduling state: picker state tracks focused versus selected target separately, scheduling state exposes a real waiting queue derived from shared-catalog `INPUT` or `CONFIRM` task signals, and the picker renders that queue without inventing a second scheduler stack.
  - The remaining gap is no longer “make scheduling state explicit”, but “keep the server console manual-only while improving waiting-state visibility honestly through shared event seams and transition-driven queue state”.
  - No further `task.t6-01` behavior change should land as a patch-style local fix. Each remaining slice must map back to the accepted design sections for runtime ownership, domain state, and implementation order.

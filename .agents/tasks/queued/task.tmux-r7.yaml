done_criteria:
  - session switching uses tmux window or session selection as the primary control path
  - sidebar focus, return behavior, and menu actions use tmux-native pane and window selection semantics rather than legacy display bookkeeping
  - waitagent-specific management affordances are limited to branded menus, discovery helpers, and metadata presentation layered on top of tmux-native control
  - navigation remains responsive during live shell and Codex output
  - when the sidebar is focused, `h` hides the sidebar and left-arrow restores or reveals the sidebar using tmux-native layout operations rather than custom surface bookkeeping
  - the footer quick menu is operational: it can create sessions, list current sessions, open a session menu, and switch to the chosen session while preserving tmux-native control semantics
  - session switching affordances and popup menus follow the legacy waitagent interaction model where it still fits, without replacing tmux's underlying session or pane selection ownership
verification:
  - cargo test
  - manual: repeated focus and session switching during live output
  - manual: sidebar hide/show shortcuts and footer menu actions work repeatedly during live shell and Codex output
touched_paths:

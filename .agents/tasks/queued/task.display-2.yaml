id: task.display-2
kind: task
version: 1
title: implement user-facing entry into native fullscreen and a reliable return shortcut
status: superseded
priority: highest
source_of_truth:
  file: .agents/tasks/backlog.yaml
  reference: next
depends_on:
  - task.display-1.done
linked_primitives:
  - primitive.verification-refresh
  - primitive.task-history-update
  - primitive.task-board-sync
done_criteria:
  - while the dashboard owns the terminal, a documented shortcut enters native fullscreen for the currently focused session without changing focus semantics or session ownership
  - while native fullscreen owns the terminal, a documented escape sequence returns the user to the dashboard without requiring daemon restart, detach, or external shell commands
  - native fullscreen preserves direct terminal behavior for scrollback, selection, IME, copy, and mouse handling because WaitAgent is no longer trying to emulate shell scrolling in dashboard mode
  - entering and leaving native fullscreen restores the focused session, redraw state, and dashboard chrome deterministically
verification:
  - cargo test
  - manual: from the dashboard, enter native fullscreen for a shell session, use the terminal's own scroll and selection behavior, then return to the dashboard with the chosen escape sequence
  - manual: run `codex resume 019d9f0f-fd40-77e2-bb15-11b4c81129b7`, enter native fullscreen, verify the session behaves like a direct terminal view, then return to the dashboard
  - targeted review of input interception and return-path control flow in `src/app.rs`
touched_paths:
  - src/app.rs
  - src/terminal.rs
  - docs/local-acceptance-checklist.md
  - .agents/tasks/queued/task.display-2.yaml
notes:
  - The preferred user interaction remains a fullscreen handoff rather than dashboard-local shell scrolling.
  - Entry and return foundations landed here, but the task is superseded because snapshot-based fullscreen history cannot satisfy the accepted old-history contract.
  - Remaining work is split into `task.display-2a`, `task.display-2b`, and `task.display-2c` so the replay model, fullscreen integration, and acceptance evidence can evolve on explicit boundaries.

done_criteria:
  - the meaning of local `create session`, `attach`, `detach`, and client exit is explicit and consistent with tmux-style multi-client semantics
  - client detach or terminal exit only removes the current client; it does not implicitly destroy other clients or the target backend
  - attaching to an existing backend is treated as tmux-style attach rather than ownership transfer
  - the implementation and task or doc state no longer rely on the temporary `detach-client -E waitagent` behavior as an implicit product definition without naming its semantics
verification:
  - cargo test
  - manual: multi-client attach and detach behavior in a real terminal
  - manual: create-session and attach flows match the documented tmux-style semantics

source_of_truth:
  file: .agents/tasks/backlog.yaml
notes:
  - `.agents/tasks/*` is the unified task source; task status changes must update backlog, the current task pointer, queued task files, and task/state mirrors in the same change.
  - Replacement work must clean up superseded code paths as it lands; old custom fullscreen and live-surface logic should not be left in place behind the tmux-first architecture unless a named compatibility reason is documented in the active task.
  - T3-07 remains optional for the local MVP unless acceptance evidence proves it is blocking.
  - The lifecycle queue is complete enough to support the tmux-first migration; resumed network expansion is deferred until the local display baseline is rebuilt on tmux-native ownership boundaries.
  - The tmux-first migration now includes an architecture-first slice because the old code structure is not an acceptable foundation for a large local-runtime rewrite.
  - The old gutter-scroll direction remains retired.
  - The old custom fullscreen-history direction is now also retired as the primary architecture because Codex-like live TUIs do not reliably repaint under the mixed narrow-PTY then widened-fullscreen model.
  - `task.architecture-1` is intentionally parked as deferred cleanup so it stays visible without silently becoming the next in-progress delivery slice.

done_criteria:
  - the legacy sidebar and footer or menu information contract is traced to concrete historical sources rather than recalled from memory
  - the analysis separates reusable product-facing style requirements from implementation details that belonged only to the old composed display pipeline
  - the analysis names which elements belong in the current tmux-pane layout slice and which interaction behaviors remain deferred to the later tmux-native menu and switching slice
  - the current tmux-pane task is amended so the accepted legacy-style contract is explicit and testable
verification:
  - review historical task and design sources for the accepted sidebar and menu contract
  - review legacy rendering tests and literals for concrete header, row, badge, and footer content patterns
touched_paths:
  - .agents/tasks/backlog.yaml
  - .agents/tasks/current.yaml
  - .agents/tasks/queued/task.tmux-style-1.yaml

summary:
  purpose: hot task history only; keep one latest-state snapshot per near-term task and keep this file small enough for selective on-demand loading
archive_file: .agents/state/task-history-archive.yaml
hot_history_policy:
  keep:
    - the active task
    - its direct predecessor or dependency tasks when they define current invariants
    - its immediate next queue when handoff context is likely to matter soon
  avoid:
    - repeated in_progress lifecycle snapshots for older tasks
    - long-tail historical records that are not shaping the active queue

id: task.geometry-2-protocol-geometry-push
kind: task
version: 1
title: add authority-to-server target geometry change push to the control plane
status: done
priority: high
design_ref:
  doc: docs/remote-geometry-coordination-design.md
  why:
    - the server must learn unsolicited target-pane geometry changes (local user attach/detach/resize, layout changes) to keep both panes at the negotiated T
    - the message shape must land before the authority coordinator and the main-slot resync can consume it
source_of_truth:
  file: .agents/tasks/backlog.yaml
  reference: next
depends_on:
  - task.geometry-1-truthful-geometry.done
done_criteria:
  - proto/waitagent/remote/v1 carries a backward-compatible target geometry message (cols, rows, and the identity fields used by existing control-plane payloads)
  - src/infra/remote_protocol.rs mirrors the message type and codec coverage exists for both envelope forms used by the authority transport
  - geometry push frames route to the owning remote-main-slot session, following the same target_id/session_id validation as RawPtyOutput
  - cargo fmt --check passes
  - cargo check passes
  - cargo test remote_protocol passes
verification:
  - cargo fmt --check
  - cargo check
  - cargo test remote_protocol -- --test-threads=1
  - cargo test remote_authority -- --test-threads=1
touched_paths:

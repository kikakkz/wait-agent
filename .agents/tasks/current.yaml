id: task.github-issue-18-remote-dead-panes-accumulate
kind: task
version: 1
title: analyze and fix remote session visibility/pane cleanup after host power-off
status: in_progress
priority: high
design_ref:
  doc: docs/remote-network-completion-plan.md
  issue: https://github.com/kikakkz/wait-agent/issues/18
  why:
    - issue #18 reports that remote sessions remain visible in the sidebar after client hosts power off
    - dead wa-hidden panes/windows accumulate because lifecycle cleanup is not triggered by offline detection
    - activation of stale remote targets can fail with unknown target
source_of_truth:
  file: .agents/tasks/current.yaml
  reference: current
depends_on:
  - task.github-issue-17-raw-pty-output-routing.done
done_criteria:
  - identify the authoritative catalog/lifecycle path that should hide or remove offline remote targets
  - identify where dead wa-hidden remote panes should be cleaned up
  - implement the minimal native fix
  - add or update tests to cover the offline cleanup path
  - cargo fmt --check passes
  - cargo check passes
  - relevant test suites pass
verification:
  - cargo fmt --check
  - cargo check
  - cargo test remote_main_slot_runtime -- --test-threads=1
  - cargo test workspace_runtime -- --test-threads=1
touched_paths:
  - src/runtime/remote_main_slot/
  - src/runtime/workspace/
notes:
  - Previous task #17 closed as fixed by #15 (commit efc741c); regression test added in commit 50acdcc.

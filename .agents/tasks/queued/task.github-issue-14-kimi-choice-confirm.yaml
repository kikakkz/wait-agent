id: task.github-issue-14-kimi-choice-confirm
kind: task
version: 1
title: fix Kimi question/choice UI classified as Running instead of Confirm
status: in_progress
priority: high
design_ref:
  doc: docs/functional-design.md
  issue: https://github.com/kikakkz/wait-agent/issues/14
  why:
    - issue #14 records that Kimi renders a structured numbered selection menu which should show Confirm badge, but the detector falls through to background-task Running detection
    - the fix must keep Kimi Running/Input/Confirm detection accurate and avoid false positives on plain prompts
source_of_truth:
  file: .agents/tasks/current.yaml
  reference: current
depends_on:
  - task.github-issue-13-remote-main-slot-stale-pane-reuse.done
done_criteria:
  - Kimi question/choice menu with numbered choices and selection hints is detected as Confirm
  - plain Kimi prompts without choice markers still resolve correctly (Input or existing Confirm rules)
  - Kimi background-task Running detection still works when no choice menu is present
  - cargo fmt --check passes
  - cargo check passes
  - cargo test agent_detector_kimi passes
verification:
  - cargo fmt --check
  - cargo check
  - cargo test agent_detector_kimi -- --test-threads=1
  - cargo test agent_detector -- --test-threads=1
touched_paths:
  - src/domain/agent_detector_kimi.rs
notes:
  - Implementation added `kimi_has_choice_menu` to detect `?` + numbered choices (`[1]`, `→ [`) + selection hints (`select`, `choose`, `esc cancel`, arrow chars) before background-task Running heuristics.
  - Added unit tests for choice-menu Confirm and background-task Running.

id: task.tmux-r7
kind: task
version: 1
title: layer waitagent session management and menus on top of tmux-native switching
status: in_progress
priority: high
source_of_truth:
  file: .agents/tasks/backlog.yaml
  reference: next
depends_on:
  - task.tmux-r6.done
linked_primitives:
  - primitive.verification-refresh
  - primitive.task-history-update
  - primitive.task-board-sync
  - primitive.agents-self-maintenance
done_criteria:
  - session switching uses tmux window or session selection as the primary control path
  - sidebar focus, return behavior, and menu actions use tmux-native pane and window selection semantics rather than legacy display bookkeeping
  - waitagent-specific management affordances are limited to branded menus, discovery helpers, and metadata presentation layered on top of tmux-native control
  - navigation remains responsive during live shell and Codex output
  - right-arrow focus handoff lands on the sidebar pane directly rather than the footer pane, and tmux-native pane order or bindings do not strand focus in the bottom chrome
  - global chrome navigation keys use tmux pane identity and layout ownership only; they do not depend on shell-prompt detection, pane-text probing, `capture-pane`, or nested shell probes
  - when the sidebar is focused, `h` hides the sidebar and left-arrow restores or reveals the sidebar using tmux-native layout operations rather than custom surface bookkeeping
  - the footer quick menu is operational: it can create sessions, list current sessions, open a session menu, and switch to the chosen session while preserving tmux-native control semantics
  - session switching affordances and popup menus follow the legacy waitagent interaction model where it still fits, without replacing tmux's underlying session or pane selection ownership
  - the footer menu item set and menu wording align with the reviewed legacy waitagent menu contract rather than shipping a placeholder or reduced menu skeleton
  - the footer menu popup and quick actions expose the legacy session-management items that remain valid in the tmux-first architecture, including session creation, current-session listing, session-target switching, and other tmux-backed management actions that replaced the old custom controls
verification:
  - cargo test
  - manual: repeated focus and session switching during live output
  - manual: sidebar hide/show shortcuts and footer menu actions work repeatedly during live shell and Codex output
  - manual: right-arrow and tmux key-driven focus movement reach the sidebar directly instead of landing on the footer pane
  - manual: footer quick menu contents and popup items match the reviewed legacy menu contract except where a specific tmux-first replacement is documented
touched_paths:
  - src/runtime
  - src/application
  - src/ui
  - src/infra/tmux.rs
  - .agents/tasks/queued/task.tmux-r7.yaml
notes:
  - This slice finishes the navigation ownership move after fullscreen and pane layout are already tmux-native.
  - Avoid inventing a separate waitagent window manager; menu actions should translate into tmux-native target selection and control.
  - The persistent chrome information contract is established in `task.tmux-r5`; this slice only adds the working interaction model on top of that chrome.
  - The legacy footer menu wording and item inventory should be reviewed against historical sources before implementation so this slice does not converge on a merely functional but contract-inconsistent menu surface.
  - Execute this task in three steps: first replace heuristic raw navigation with pane-identity-driven global chrome keys, then finish the footer quick-menu and session-menu interactions, then rerun manual validation during live shell and Codex output.
  - Prompt-aware or pane-content-aware sidebar activation is explicitly rejected for this slice even if it appears to reduce app-key conflicts, because it is less native, less stable, and less compatible with future remote-session interaction surfaces.

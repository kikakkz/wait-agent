id: task.sidebar-4
kind: task
version: 1
title: polish the default-visible sidebar detail area and enter-to-switch behavior
status: in_progress
priority: medium
source_of_truth:
  file: .agents/tasks/backlog.yaml
  reference: next
depends_on:
  - task.sidebar-3.done
linked_primitives:
  - primitive.verification-refresh
  - primitive.task-history-update
  - primitive.task-board-sync
  - primitive.agents-self-maintenance
done_criteria:
  - the sidebar is visible by default in framed console mode whenever the terminal is wide enough for the sidebar layout
  - the sidebar can be hidden without losing discoverability, and a collapsed right-edge affordance remains visible so `Right` can reopen it
  - the selected session path/detail is rendered in a dedicated fixed bottom sidebar area above the bottom info bar rather than in the shared status line
  - pressing `Enter` while the sidebar owns focus switches to the focused session
  - after switching, the sidebar focus and selection remain aligned to the switched session rather than dropping focus back to the main view automatically
  - the bottom info bar remains full-width and is not widened, overwritten, or vertically covered by the sidebar overlay
  - no automation-rule UI or execution logic is introduced in this slice
verification:
  - manual: start the workspace UI, confirm the sidebar is visible by default, move focus with `Right`, hide it with `h`, reopen it with `Right`, and confirm the collapsed hint remains visible while the bottom info bar stays intact
  - manual: move sidebar focus across sessions and confirm the bottom path detail follows the selection, then press `Enter` and confirm the target session becomes focused without losing sidebar alignment
touched_paths:
  - src/app.rs
  - .agents/tasks/queued/task.sidebar-4.yaml
  - .agents/
notes:
  - Future automation rules may live near the sidebar later, but they are intentionally excluded from this task.
  - `Enter`-to-switch and selection alignment are already live in the current prototype.
  - The sidebar detail row is now dedicated to the selected-session path instead of reusing the shared status line.
  - The remaining scope in this slice, if real usage demands it, is better long-path presentation without regressing the stabilized render path.

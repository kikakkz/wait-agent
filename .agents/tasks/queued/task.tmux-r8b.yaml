notes:
  - This slice is about local session semantics only. Remote-session transport and server interact flows remain future work.
  - The user explicitly chose tmux-style client semantics: client exit or detach removes only the current client, not all clients attached to the same backend.
  - Superseded on 2026-04-23 after the local runtime plan was redirected to an event-driven rewrite queue.

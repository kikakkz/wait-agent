version: 1
kind: agent_control_plane
read_order:
  - .agents/state/current-focus.yaml
  - .agents/context/project.yaml
  - .agents/context/constraints.yaml
  - .agents/context/repo-map.yaml
  - .agents/context/generated-artifacts.yaml
  - .agents/tasks/current.yaml
  - .agents/tasks/backlog.yaml
  - .agents/tasks/templates/local-acceptance-cycle.yaml
  - .agents/tasks/templates/network-implementation-slice.yaml
  - .agents/state/open-blockers.yaml
  - .agents/state/last-verified.yaml
  - .agents/state/task-history.yaml
entrypoints:
  default_task: task.tmux-0
  default_runbook: runbook.continue-default-work
  next_task_runbook: runbook.select-next-task
  self_maintenance_runbook: runbook.update-agents-control-plane
authoritative_sources:
  execution_board: docs/execution-status-board.md
  acceptance_checklist: docs/local-acceptance-checklist.md
  architecture: docs/architecture.md
  tmux_first_plan: docs/tmux-first-workspace-plan.md
  tmux_first_runtime_architecture: docs/tmux-first-runtime-architecture.md
  functional_design: docs/functional-design.md
  interaction_flows: docs/interaction-flows.md
  human_overview: docs/agents-control-plane.md
required_rules:
  - Read this file before exploring the repo.
  - Use tasks plus primitives to decide the next action.
  - Keep human-facing rationale in docs rather than .agents.
  - Treat .agents/tasks/ as the unified task source; every real task must appear there and orphan tasks are not allowed.
  - Update .agents whenever task focus, blockers, validation state, or reusable execution knowledge changes.
  - Do not let .agents drift from docs/execution-status-board.md or docs/local-acceptance-checklist.md.
directories:
  context: .agents/context
  primitives: .agents/primitives
  runbooks: .agents/runbooks
  tasks: .agents/tasks
  state: .agents/state
  schemas: .agents/schemas
  generated: .agents/generated
active_context:
  project_phase: phase-1
  current_stage: tmux-first-local-architecture-migration
  current_focus: execute event-r3 now that event-r2a umbrella acceptance is closed, starting with accepted-path attach, resize, and scheduler control that still relies on tick, timeout, or sleep-based coordination
recommended_primitives:
  - primitive.read-current-task
  - primitive.verification-refresh
  - primitive.task-history-update
  - primitive.task-board-sync
  - primitive.task-switch-current
  - primitive.agents-self-maintenance
recommended_runbooks:
  - runbook.continue-default-work
  - runbook.select-next-task
  - runbook.instantiate-task-from-template
  - runbook.update-agents-control-plane

  - src/infra/remote_protocol.rs
  - src/infra/remote_transport_codec.rs
  - src/runtime/remote_authority/remote_authority_connection_runtime.rs
notes:
  - follow the routing-validation lesson from issues #15/#17: validate session_id/target_id before accepting a geometry frame

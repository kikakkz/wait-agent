id: task.tmux-r5
kind: task
version: 1
title: implement sidebar and footer as tmux-owned waitagent panes on stable tmux layouts
status: done
priority: high
source_of_truth:
  file: .agents/tasks/backlog.yaml
  reference: next
depends_on:
  - task.tmux-r4.done
  - task.tmux-style-1.done
linked_primitives:
  - primitive.verification-refresh
  - primitive.task-history-update
  - primitive.task-board-sync
  - primitive.agents-self-maintenance
done_criteria:
  - each managed workspace can host a stable tmux layout with a real main pane plus waitagent-owned sidebar and footer panes
  - sidebar and footer rendering move to dedicated waitagent pane programs or pane-oriented runtimes
  - the main pane remains a tmux-native shell or agent surface and is no longer composed with sidebar or footer on the same display surface
  - layout creation, restore, and focus handoff use tmux-native split and pane selection primitives rather than waitagent-owned frame composition
  - the sidebar and footer consume a shared session-registry model that can later represent both local tmux sessions and future network-backed sessions
  - the footer baseline remains a single row after attach, resize, session create, session exit, and cross-session geometry churn, even when another attached session used a different client height
  - the sidebar top section, list rows, and footer section follow the legacy waitagent information hierarchy while being rendered by tmux-owned panes
  - sidebar session rows display runtime identity in a transport-aware form such as `bash@local`, `codex@local`, or `codex@192.168.1.31`, and the right edge shows the current task state using the legacy-style status treatment
  - the sidebar footer shows the currently selected session's basic metadata using the shared session catalog rather than ad hoc local-only fields
  - the persistent footer bar shows the current session directory at the far right and shows aggregate session totals plus per-state counts in the status area
verification:
  - cargo test
  - manual: shell and codex remain visually uncorrupted while sidebar and footer stay visible
  - manual: existing oversized sidebar and footer panes are normalized back to the fixed waitagent geometry during layout restore
  - manual: a maximized desktop terminal attach triggers native tmux reconcile hooks that keep the sidebar at fixed width and the footer at a single row after client attach and resize
  - manual: two default `waitagent` launches from the same directory create two independent backends, and `waitagent ls` reports them as tmux-like session lines keyed by session id
  - manual: attaching to and exiting from a second session with a different terminal height does not leave the current session footer taller than one row
  - manual: sidebar rows and footer info match the intended legacy-style information layout for local and future network-addressed sessions
touched_paths:
  - src/cli.rs
  - src/command
  - src/ui
  - src/runtime
  - src/application
  - src/infra/tmux.rs
  - src/infra/tmux_backend
  - .agents/tasks/queued/task.tmux-r5.yaml
notes:
  - This slice preserves the product contract while moving UI ownership into tmux panes.
  - Do not reimplement shell rendering, scrollback, or fullscreen behavior here; the only new waitagent-owned surfaces should be the sidebar and footer panes.
  - Sidebar and footer are architecturally persistent panes even if the main pane later zooms fullscreen.
  - 2026-04-22 progress: workspace bootstrap now ensures a tmux-owned sidebar pane and a tmux-owned footer pane through a dedicated layout runtime plus hidden pane-program entrypoints.
  - 2026-04-22 progress: sidebar and footer panes now consume the shared managed-session catalog shape instead of the legacy composed display state, but real-terminal visual validation with shell and codex is still pending.
  - 2026-04-22 progress: sidebar width and footer height now default to fixed tmux-native cell sizes rather than oversized percentages, which makes the chrome materially less intrusive before later show or hide and menu interaction work.
  - 2026-04-22 progress: the footer pane now renders a branded waitagent menu skeleton instead of only generic hint text, but menu actions and sidebar toggle behavior are still pending later tmux-native slices.
  - 2026-04-22 root cause: the oversize chrome bug was not caused by tmux preferring large panes; it happened because layout restore only applied split sizes when panes were first created and never normalized the geometry of already-existing waitagent-owned panes.
  - 2026-04-22 verification: release-terminal validation confirmed that after manually inflating the existing sidebar and footer panes to 35x5, the waitagent restore path returned them to 24x2.
  - 2026-04-22 root cause refinement: a maximized desktop terminal can attach at one size and then receive a later client resize from the window manager; tmux reflows the session layout during that later resize, and bootstrap-only normalization does not reapply the fixed waitagent chrome geometry.
  - 2026-04-22 progress: waitagent now registers native tmux `client-attached` and `client-resized` hooks that run a hidden layout-reconcile command, so chrome geometry is restored after attach-time and window-manager resize events without routing the fix through attach-specific runtime patches.
  - 2026-04-22 progress: footer chrome now defaults to a single fixed row and renders a single-line menu summary; later submenu work may temporarily expand it, but the persistent footer baseline is now one row.
  - 2026-04-22 progress: tmux-native session identity is no longer derived from workspace path; each default `waitagent` launch now creates a fresh backend session id, and only explicit `attach` reuses an existing session.
  - 2026-04-22 progress: `waitagent ls` now emits tmux-like session summary lines keyed by the session id, and session target matching no longer depends on workspace path aliases.
  - 2026-04-22 refinement: the current slice also owns the legacy-style sidebar and footer information contract, including transport-aware row labels like `bash@local` or `codex@192.168.1.31`, selected-session summary at the bottom of the sidebar, and footer aggregate counters plus current-directory display.
  - 2026-04-22 refinement: menu actions, sidebar hide/show shortcuts, and session-switch popups remain intentionally deferred to the later tmux-native session-management slice rather than being partially reintroduced here.
  - 2026-04-22 refinement: legacy style requirements for this slice are grounded in explicit sources: `task.sidebar-1` for the sidebar contract, `docs/ui-design.md` for persistent chrome hierarchy, and `src/app.rs` legacy tests and literals for concrete header, row, badge, and footer string patterns.
  - 2026-04-22 completion: the pane metadata model now exposes transport-aware labels, inferred task state, current directory, and aggregate footer counters to the dedicated sidebar and footer pane runtimes.
  - 2026-04-22 completion: native tmux reconcile hooks now cover attach, detach, resize, and session-change churn, and manual validation confirmed that a second differently-sized client can attach and leave without lifting the footer above one row.
  - 2026-04-22 completion: tmux's built-in status bar is disabled for waitagent-managed sessions so the persistent footer pane is the only bottom chrome surface.

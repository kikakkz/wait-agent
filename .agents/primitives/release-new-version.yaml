id: primitive.release-new-version
kind: primitive
version: 1
purpose: Release a new waitagent version by tagging the current version and bumping main to the next patch version.
use_when:
  - user says "发布新版本" or asks to release a new version
inputs:
  - Cargo.toml
  - Cargo.lock
steps:
  - Read the current version from Cargo.toml (e.g., 0.0.171).
  - Ensure Cargo.lock has the same version for the `waitagent` package; if not, run `cargo update -p waitagent` or edit Cargo.lock to match.
  - Run `cargo check` to validate the tree and refresh Cargo.lock if necessary.
  - Create an annotated git tag `v<current>` (e.g., `v0.0.171`) on the current HEAD.
  - Push the tag to origin.
  - Bump the version in Cargo.toml to the next patch version (e.g., `0.0.172`).
  - Run `cargo update -p waitagent` so Cargo.lock reflects the new version.
  - Run `cargo check` again to confirm the tree is clean.
  - Commit with message `chore: bump version to <next>` (e.g., `chore: bump version to 0.0.172`).
  - Push the commit to origin main.
verification:
  - The new tag exists on origin.
  - Cargo.toml and Cargo.lock both show the next version on main.
  - `cargo check` passes.
failure_modes:
  - Tag already exists locally or remotely.
  - Cargo.lock version drifts from Cargo.toml.
  - Push rejected because main has moved forward.

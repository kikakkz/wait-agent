source_of_truth:
  file: .agents/tasks/backlog.yaml
notes:
  - `.agents/tasks/*` is the unified task source; task status changes must update backlog, the current task pointer, queued task files, and task/state mirrors in the same change.
  - Active implementation work must have an explicit top-down design source. Do not land patch-style behavior changes that only exist in chat or status notes without a governing design document.
  - Every new in-progress or queued implementation task must declare a `design_ref` field that points to the governing top-down design document and explains why that document authorizes the slice. Tasks without `design_ref` are not ready for execution.
  - Replacement work must clean up superseded code paths as it lands; old custom fullscreen and live-surface logic should not be left in place behind the tmux-first architecture unless a named compatibility reason is documented in the active task.
  - T3-07 remains optional for the local MVP unless acceptance evidence proves it is blocking.
  - The lifecycle queue is complete enough to support the tmux-first migration; resumed network expansion is deferred until the local display baseline is rebuilt on tmux-native ownership boundaries.
  - The tmux-first migration now includes an architecture-first slice because the old code structure is not an acceptable foundation for a large local-runtime rewrite.
  - The accepted destination is a waitagent-branded tmux-like tool: `workspace` may remain as bootstrap UX, but core runtime identity and command semantics should converge on tmux-native targets and capabilities.
  - The lifecycle daemon queue and old composed-sidebar implementation queue are now historical transitional work, not the accepted destination; they should not drive future architecture decisions.
  - The refined execution order is: tmux-native command semantics first, tmux-owned sidebar and footer second, tmux-native fullscreen and control behavior third, waitagent management affordances fourth, and only then final transitional-path deletion.
  - 2026-04-23 direction reset: new local-runtime work is now anchored on an event-driven rewrite queue. Fixed tick, sleep, and timeout polling loops are not an acceptable primary architecture for new implementation slices.
  - 2026-04-24 refinement: fixed-chrome main-slot target activation is now a prerequisite for further attach-side event cleanup, because the current sidebar or footer switch path still detaches the client and launches `waitagent attach <target>`.
  - 2026-04-24 execution lock: `task.event-r2a -> task.event-r3 -> task.event-r4` is the top-priority local batch and must complete before resuming remote, network, or optional polish work.
  - Remaining network and remote tasks must build on the shared transport-agnostic target catalog and fixed-chrome main-slot activation model; do not resume them on top of superseded daemon, attach, or local-only session assumptions.
  - 2026-04-27 refinement: the original umbrella `task.t5-06` is now split into `task.t5-06a -> task.t5-06b -> task.t5-06c` so the resumed remote queue lands docs, model, and registry-boundary work in separate bounded slices before transport routing begins.
  - 2026-04-27 update: `task.t5-06a` is complete enough to close; active work now moves to `task.t5-06b`, which generalizes target identity and catalog records without starting transport routing.
  - 2026-04-27 update: `task.t5-06b` is complete enough to close after the shared target model, protocol identity contract, and compatibility accessors landed; active work now moves to `task.t5-06c`, where local tmux becomes the first producer behind an explicit target-registry boundary.
  - 2026-04-27 update: `task.t5-06c` is complete enough to close after current consumers were rerouted through a dedicated target-registry service, so active work now moves to `task.t5-07`, the first real remote transport-routing slice.
  - 2026-04-29 refinement: the original `task.t6-01` umbrella is now split into `task.t6-01a -> task.t6-01b -> task.t6-01c -> task.t6-01d` so the remaining server-console work lands as bounded design-backed slices rather than patch-style continuation.
  - The old gutter-scroll direction remains retired.
  - The old custom fullscreen-history direction is now also retired as the primary architecture because Codex-like live TUIs do not reliably repaint under the mixed narrow-PTY then widened-fullscreen model.
  - `task.architecture-1` is intentionally parked as deferred cleanup so it stays visible without silently becoming the next in-progress delivery slice.
  - The original `task.tmux-1` through `task.tmux-6` split is preserved as historical planning only and is superseded by the rewrite queue after review found that the bridge-heavy path would preserve too much of the legacy lifecycle structure.

notes:
  - This slice should build the new control path, not patch the historical tick loop in place unless that is the smallest route to isolate it behind a new boundary.
  - 2026-04-24 pause: do not resume this slice until in-workspace target switching stops leaving the current client. The current `detach-client -E "waitagent attach <target>"` path is an upstream blocker because it cannot satisfy fixed chrome, no shell reveal, or no flicker.
  - 2026-04-27 resume: `task.event-r2a` umbrella acceptance is now complete, including real-terminal validation that sidebar Enter and footer menu switching keep the workspace chrome mounted while only the main slot target changes.
  - 2026-04-27 progress: startup chrome readiness no longer polls pane text with fixed sleeps on the accepted path; sidebar and footer now mark initial readiness through explicit tmux wait-for channels plus pane-identity session options, and workspace layout waits on those signals with a bounded timeout fallback.
  - 2026-04-27 progress: the accepted path now re-establishes a main-pane output bridge with `pipe-pane -O`, but that bridge only emits a lightweight `__chrome-refresh-signal`; pane runtimes consume the signal and refresh snapshots themselves, so shell-to-agent command identity changes such as `bash -> codex` update sidebar labels without requiring a fullscreen round-trip or a full layout refresh.
  - When this slice resumes, audit `src/app.rs` and attach-side control flow for remaining `EVENT_LOOP_TICK`, `recv_timeout`, and sleep-based coordination on the accepted local path.
  - This task is the second slice in the locked local-priority batch `task.event-r2a -> task.event-r3 -> task.event-r4`.

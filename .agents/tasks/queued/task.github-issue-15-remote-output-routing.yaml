id: task.github-issue-15-remote-output-routing
kind: task
version: 1
title: fix remote output routed into wrong pane when multiple sessions share a host
status: in_progress
priority: high
design_ref:
  doc: docs/remote-network-completion-plan.md
  issue: https://github.com/kikakkz/wait-agent/issues/15
  why:
    - issue #15 reports that when multiple remote sessions are open on the same remote host, output from different sessions can be mixed into the wrong pane
    - the root cause is that remote main-slot output routing is validated at authority-node level but not strongly at session/target/attachment level before forwarding to a pane
source_of_truth:
  file: .agents/tasks/current.yaml
  reference: current
depends_on:
  - task.github-issue-14-kimi-choice-confirm.done
done_criteria:
  - remote output envelopes are rejected or dropped when their payload target_id/session_id/attachment_id does not match the current pane binding
  - output routing validation happens before the payload is appended to the pane output sequence
  - existing single-session remote output behavior continues to work
  - cargo fmt --check passes
  - cargo check passes
  - cargo test remote_main_slot_pane_runtime passes
  - cargo test remote_transport_runtime passes
verification:
  - cargo fmt --check
  - cargo check
  - cargo test remote_main_slot_pane_runtime -- --test-threads=1
  - cargo test remote_transport_runtime -- --test-threads=1
  - cargo test remote_node_ingress_runtime -- --test-threads=1
touched_paths:
  - src/runtime/remote_main_slot/remote_main_slot_pane_runtime.rs
  - src/runtime/remote_main_slot/remote_main_slot_pane_runtime/slot_pane_helpers.rs
  - src/runtime/remote_publication/remote_transport_runtime.rs
  - src/runtime/remote_node/remote_node_ingress_runtime.rs
notes:
  - Issue identifies that apply_authority_envelope validates envelope.sender_id against target authority but does not validate payload target_id/session_id/attachment_id against current pane binding.

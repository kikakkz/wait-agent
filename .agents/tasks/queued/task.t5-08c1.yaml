done_criteria:
  - inbound remote `target_published` and `target_exited` envelopes update a node-scoped discovered-target catalog without depending on pre-existing tmux publication bindings
  - workspace sidebar and remote activation consume that shared catalog so a newly connected remote node can surface visible targets before any manual open has already happened
  - remote node disconnect marks discovered targets offline rather than silently removing them from catalog-driven surfaces
  - `waitagent ls` keeps local backend semantics and does not become a remote connection or remote target listing command

id: task.scroll-1
kind: task
version: 1
title: implement tmux-style pane history with mouse-draggable gutter scrolling
status: superseded
priority: high
source_of_truth:
  file: .agents/tasks/backlog.yaml
  reference: next
depends_on:
  - task.sidebar-4.done
linked_primitives:
  - primitive.verification-refresh
  - primitive.task-history-update
  - primitive.task-board-sync
  - primitive.agents-self-maintenance
done_criteria:
  - WaitAgent maintains per-session pane history at the terminal parsing layer whenever output scrolls lines off the visible screen, so older content remains available even after live child sessions such as `codex resume` repaint the current viewport
  - framed console mode renders the focused session from pane history plus the current visible screen and shows a visible one-column scrollbar gutter between the main shell viewport and the sidebar whenever older pane history exists beyond the visible viewport
  - dragging the scrollbar thumb with the mouse scrolls the focused session through its own pane-history viewport without changing session focus or input ownership
  - WaitAgent only interprets mouse press, drag, and release events that land inside the scrollbar gutter; clicks and drags in the shell body, footer, and sidebar remain ignored by WaitAgent
  - the implementation does not introduce generic mouse-focus capture, click-to-focus semantics, or content-area mouse handling beyond the scrollbar gutter
  - when the user starts typing any forwarded keyboard input, the focused session viewport snaps back to the live tail before the input is forwarded
  - switching focus to another session snaps the newly focused session viewport back to the live tail immediately
  - live fullscreen passthrough sessions such as Codex do not regress; when framed output is still visible, WaitAgent may render the same gutter and thumb, but non-gutter mouse input continues to be forwarded to the child application instead of being consumed by WaitAgent
verification:
  - manual: in framed shell mode, produce enough output to push lines off-screen, drag the scrollbar thumb upward, and confirm the focused session scrolls through older pane history while session focus and input ownership stay unchanged
  - manual: after dragging away from the tail, type a key destined for the focused session and confirm the viewport returns to the bottom before the input takes effect
  - manual: drag away from the tail in one session, switch to another session, and confirm the newly focused session opens at its live bottom rather than inheriting the previous scroll offset
  - manual: run `codex resume 019d9f0f-fd40-77e2-bb15-11b4c81129b7`, allow output to truly scroll earlier lines off-screen, then drag the gutter and confirm those older lines are reachable; same-line or same-cell redraw history is not expected to be preserved
  - manual: run Codex in the focused session and confirm WaitAgent does not interfere with the child application's mouse behavior outside the dedicated scrollbar gutter
verification_notes:
  - real PTY validation confirmed gutter drag can move the framed viewport from `scroll-061`..`scroll-080` to `scroll-001`..`scroll-021`
  - real PTY validation confirmed typing after an upward drag snaps back to the tail before the forwarded key takes effect
  - real PTY validation confirmed a live child app receives non-gutter SGR mouse packets unchanged while the dedicated gutter path remains reserved for WaitAgent scrolling
touched_paths:
  - src/app.rs
  - src/renderer.rs
  - src/console.rs
  - src/terminal.rs
  - .agents/tasks/backlog.yaml
  - .agents/tasks/queued/task.scroll-1.yaml
notes:
  - The prototype produced useful viewport and pane-history work, but the product direction has changed.
  - xterm-style mouse reporting is not a robust foundation for dashboard scrolling in remote terminals such as Xshell and PuTTY because it conflicts with native selection, copy, and terminal-owned scroll behavior.
  - The follow-up direction is fullscreen handoff, where the real terminal owns scrollback and mouse behavior.

id: task.github-issue-13-remote-main-slot-stale-pane-reuse
kind: task
version: 1
title: fix remote main-slot reuse of live stale pane after transport disconnect
status: in_progress
priority: high
design_ref:
  doc: docs/remote-network-completion-plan.md
  issue: https://github.com/kikakkz/wait-agent/issues/13
  why:
    - issue #13 identifies a concrete phase-2 defect where a tmux-live remote main-slot pane can be reused after its control-plane generation is stale
    - the fix must keep the accepted fixed-chrome, tmux-native pane lifecycle intact while adding explicit remote-surface generation/state validation
source_of_truth:
  file: .agents/tasks/current.yaml
  reference: current
depends_on:
  - task.transport-stability-batch.done
  - task.remote-exit-latency-4.done
  - task.remote-main-slot-authority-gap-followup.done
done_criteria:
  - remote main-slot pane reuse validates control-plane/authority generation or explicit remote-surface state, not just tmux liveness and session identity
  - a pane whose remote surface has reached Exited is never reused for the same target
  - reconnecting or connected panes can still be retained so the pane runtime owns their lifecycle
  - cargo check passes
  - cargo test remote_main_slot_pane_runtime passes
  - the main_slot_runtime test suite either passes or has its pre-existing failures explicitly documented as out of scope
verification:
  - cargo fmt --check
  - cargo check
  - cargo test remote_main_slot_pane_runtime -- --test-threads=1
  - cargo test main_slot_runtime -- --test-threads=1 (known pre-existing failure tracked separately)
touched_paths:
  - src/runtime/remote_main_slot/remote_surface_state.rs
  - src/runtime/remote_main_slot/remote_main_slot_pane_runtime.rs
  - src/runtime/remote_main_slot/remote_main_slot_ingress_runtime.rs
  - src/runtime/workspace/main_slot_runtime.rs
  - src/runtime/workspace/workspace_layout_runtime.rs
notes:
  - Initial implementation tracked in GitHub issue #13 is already present as uncommitted changes in the working tree.
  - '`remote_surface_state.rs` was added to store per-pane remote-surface metadata (target, authority, state, generation, updated-at) via tmux pane options.'
  - '`main_slot_runtime.rs` now consults this state before reusing an existing remote session pane.'
  - '`remote_main_slot_pane_runtime.rs` updates the state through Starting -> Connected -> Reconnecting -> Exited transitions.'
  - '`remote_main_slot_ingress_runtime.rs` defers authority socket registration with exponential backoff instead of failing the pane on transient registration absence.'

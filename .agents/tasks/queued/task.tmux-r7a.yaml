done_criteria:
  - entering fullscreen for the main session does not hide the waitagent menu surface
  - the fullscreen interaction model remains tmux-native for the main pane while the menu stays visible through an explicit, documented ownership model
  - menu visibility in fullscreen does not regress tmux pane history, copy-mode, sidebar restore, or session switching behavior
  - the implementation does not reintroduce the old waitagent-owned fullscreen compositor or replay path
verification:
  - cargo test

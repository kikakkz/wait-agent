  - src/application
  - src/ui
  - src/infra/tmux.rs
  - .agents/tasks/queued/task.tmux-r7.yaml
notes:
  - This slice finishes the navigation ownership move after fullscreen and pane layout are already tmux-native.
  - Avoid inventing a separate waitagent window manager; menu actions should translate into tmux-native target selection and control.
  - The persistent chrome information contract is established in `task.tmux-r5`; this slice only adds the working interaction model on top of that chrome.
